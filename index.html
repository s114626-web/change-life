<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>隨機人生模擬器 Plus v3 完整升級版</title>
<style>
body{margin:0;font-family:"Microsoft JhengHei",sans-serif;color:#fff;
background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#0f766e);
background-size:400% 400%;animation:bg 15s ease infinite;padding:20px}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{max-width:1200px;margin:auto}
button{padding:14px 28px;border:none;border-radius:12px;background:#3b82f6;color:#fff;font-size:18px;cursor:pointer}
.card{background:rgba(15,23,42,.85);padding:20px;border-radius:18px;margin-top:20px;animation:fade .8s}
@keyframes fade{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.box{background:#334155;padding:10px;border-radius:10px}
svg{display:block;margin:auto;max-width:250px}
</style>
</head>
<body>
<div class="container">
<h1>🌍 隨機人生模擬器 Plus v3 完整升級版</h1>
<div style="text-align:center"><button onclick="generateLife()">開始人生</button></div>
<div id="output"></div>
</div>

<script>
const countries={
"台灣":["漢人","原住民族"],"日本":["東亞人"],"韓國":["東亞人"],"中國":["漢族"],
"香港":["華人"],"新加坡":["華人"],"泰國":["東南亞人"],"越南":["東南亞人"],
"菲律賓":["東南亞人"],"馬來西亞":["馬來人","華人"],"印尼":["東南亞人"],
"印度":["南亞人"],"巴基斯坦":["南亞人"],"英國":["歐洲白人"],
"法國":["歐洲白人"],"德國":["歐洲白人"],"義大利":["歐洲白人"],
"西班牙":["歐洲白人"],"瑞典":["北歐人"],"挪威":["北歐人"],
"芬蘭":["北歐人"],"美國":["歐洲裔","亞裔","拉丁裔"],"加拿大":["歐洲裔","亞裔"],
"墨西哥":["拉丁裔"],"巴西":["混血"],"阿根廷":["拉丁裔"],
"智利":["拉丁裔"],"澳洲":["歐洲裔"],"紐西蘭":["歐洲裔"],
"埃及":["北非人"],"摩洛哥":["北非人"],"南非":["非洲人"],
"奈及利亞":["非洲人"],"肯亞":["非洲人"]
};

const jobs={
"台灣":["工程師","醫師","教師","護理師","會計師"],
"日本":["動畫師","研究員","工程師","機械設計師"],
"美國":["企業家","律師","演員","軟體工程師"],
"德國":["汽車工程師","科學家"],
"印度":["軟體工程師","教授","醫師"],
"default":["商人","設計師","記者","教師","科學家"]
};

const educations=["國小","國中","高中","專科","大學","碩士","博士"];
const hairs=["短髮","長髮","馬尾","捲髮","光頭","鮑伯頭"];
const clothes=["T恤","襯衫","西裝","醫師袍","工程背心","制服"];

function rand(a){return a[Math.floor(Math.random()*a.length)]}

function avatar(){
const skin=rand(["#f1c27d","#e0ac69","#c68642","#8d5524"]);
const shirt=rand(["#2563eb","#16a34a","#9333ea","#dc2626","#d97706"]);
return `<svg viewBox="0 0 220 250">
<path d="M50 55 Q110 10 170 55" stroke="black" stroke-width="14" fill="none"/>
<circle cx="110" cy="90" r="50" fill="${skin}"/>
<circle cx="92" cy="85" r="3"/><circle cx="128" cy="85" r="3"/>
<path d="M95 110 Q110 122 125 110" stroke="black" fill="none"/>
<rect x="70" y="145" width="80" height="85" rx="10" fill="${shirt}"/>
</svg>`;
}

function generateLife(){
const birthCountry=rand(Object.keys(countries));
const race=rand(countries[birthCountry]);
const currentCountry=Math.random()<0.4?rand(Object.keys(countries)):birthCountry;
const edu=rand(educations);
const job=rand(jobs[birthCountry]||jobs.default);

const wealth=Math.floor(Math.random()*101);
const happiness=Math.floor(Math.random()*101);
const achievement=Math.floor(Math.random()*101);
const health=Math.floor(Math.random()*101);
const age=60+Math.floor(Math.random()*35);

const timeline=[
"6歲：進入國小",
"12歲：國中畢業",
"15歲：高中就讀",
"18歲：高中畢業",
"22歲：完成高等教育",
"25歲：開始職涯",
"30歲：建立家庭"
];

if(currentCountry!==birthCountry){
timeline.push("35歲：移民至 "+currentCountry);
}
timeline.push("50歲：人生事業高峰");
timeline.push(age+"歲：完成人生旅程");

const story=`這位人物出生於${birthCountry}，屬於${race}族群。從小接受教育，最終取得${edu}學歷。
成年後投入${job}工作，在職場中逐步累積經驗與專業能力。
在人生旅途中，建立家庭、拓展人際關係，也經歷成功與挑戰。
${currentCountry!==birthCountry?`中年時因工作、留學或人生規劃移民至${currentCountry}，開啟全新階段。`:"大部分時間都在出生地發展。"}
透過持續努力，逐步累積財富與成就，也提升了生活品質與幸福感。
晚年回顧過去，無論是學業、工作、家庭或夢想，都留下了屬於自己的足跡。
最終在人生的終點，以豐富的經歷與回憶畫下句點。`;

document.getElementById("output").innerHTML=`
<div class="card">
${avatar()}
<div class="grid">
<div class="box">出生國家：${birthCountry}</div>
<div class="box">現居國家：${currentCountry}</div>
<div class="box">族群：${race}</div>
<div class="box">學歷：${edu}</div>
<div class="box">職業：${job}</div>
<div class="box">髮型：${rand(hairs)}</div>
<div class="box">服裝：${rand(clothes)}</div>
<div class="box">財富：${wealth}</div>
<div class="box">幸福：${happiness}</div>
<div class="box">成就：${achievement}</div>
<div class="box">健康：${health}</div>
<div class="box">享年：${age}</div>
</div>
<h2>人生大事紀</h2>
<ul>${timeline.map(x=>"<li>"+x+"</li>").join("")}</ul>
<h2>人生故事</h2>
<p>${story}</p>
</div>`;
}
</script>
</body>
</html>
